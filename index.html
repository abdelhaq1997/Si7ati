<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صحتي+</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:10px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px}
button{padding:8px;border:none;border-radius:6px;background:#10b981;color:#fff;margin:5px}
input{padding:8px;border-radius:6px;border:none;margin:5px}
</style>
</head>
<body>

<h2>صحتي+</h2>
<button id="installBtn" style="display:none">📲 تثبيت التطبيق</button>

<div class="card">
<h3>🎯 الهدف</h3>
<input id="goal" placeholder="70">
<button onclick="saveGoal()">حفظ</button>
<p id="progress"></p>
</div>

<div class="card">
<h3>⚡ إدخال سريع</h3>
<button onclick="quick()">+ تسجيل سريع</button>
</div>

<div class="card">
<h3>📈 الوزن</h3>
<input id="weight" type="number">
<button onclick="addWeight()">حفظ</button>
</div>

<div class="card">
<h3>🔥 Streak</h3>
<p id="streak"></p>
</div>

<div class="card">
<h3>🧠 المدرب الذكي</h3>
<p id="coach"></p>
</div>

<div class="card">
<h3>📊 تحليل أسبوعي</h3>
<p id="weekly"></p>
</div>

<script>
// storage
let weights = JSON.parse(localStorage.getItem("weights")||"[]");
let goal = localStorage.getItem("goal");
let streak = parseInt(localStorage.getItem("streak")||0);

// goal
function saveGoal(){
goal = document.getElementById("goal").value;
localStorage.setItem("goal",goal);
updateAll();
}

// weight
function addWeight(){
let w = parseFloat(document.getElementById("weight").value);
if(!w) return;
weights.push(w);
localStorage.setItem("weights",JSON.stringify(weights));
streak++;
localStorage.setItem("streak",streak);
updateAll();
}

// progress
function updateProgress(){
if(!goal || weights.length==0) return;
let current = weights[weights.length-1];
let percent = Math.min(100,(current/goal)*100).toFixed(1);
document.getElementById("progress").innerText =
"الوزن: "+current+" | التقدم: "+percent+"%";
}

// streak
function updateStreak(){
document.getElementById("streak").innerText =
"🔥 "+streak+" يوم متتالي";
}

// coach
function coach(){
let msg="";
if(weights.length>=3){
let a=weights.slice(-3);
if(a[2]<=a[1]) msg="زد 300 سعرة";
else msg="استمر 👍";
}
document.getElementById("coach").innerText=msg;
}

// weekly
function weekly(){
document.getElementById("weekly").innerText =
"عدد التسجيلات: "+weights.length;
}

// quick
function quick(){
streak++;
localStorage.setItem("streak",streak);
updateStreak();
}

// install
let deferred;
window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferred=e;
document.getElementById("installBtn").style.display="block";
});
installBtn.onclick=async ()=>{
if(!deferred) return;
deferred.prompt();
await deferred.userChoice;
};

// init
function updateAll(){
updateProgress();
updateStreak();
coach();
weekly();
}
updateAll();

// service worker
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
